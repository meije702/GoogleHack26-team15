name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/marketing-ai/backend
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/marketing-ai/frontend

jobs:
  # -----------------------------------------------------------
  # 1. Build & push Docker images
  # -----------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          docker build -t "${{ env.BACKEND_IMAGE }}:${{ github.sha }}" \
                        -t "${{ env.BACKEND_IMAGE }}:latest" \
                        ./backend
          docker push "${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          docker push "${{ env.BACKEND_IMAGE }}:latest"

  # -----------------------------------------------------------
  # 2. Deploy backend to Cloud Run
  # -----------------------------------------------------------
  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marketing-ai-backend
          region: ${{ env.REGION }}
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: >-
            --service-account=marketing-ai-backend@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --allow-unauthenticated
            --memory=1Gi
            --cpu=2
            --min-instances=0
            --max-instances=5
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.REGION }}
            GOOGLE_GENAI_USE_VERTEXAI=TRUE

      - name: Print backend URL
        run: echo "Backend URL ${{ steps.deploy.outputs.url }}"

  # -----------------------------------------------------------
  # 3. Deploy frontend to Cloud Run (depends on backend URL)
  # -----------------------------------------------------------
  deploy-frontend:
    needs: [build-backend, deploy-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url }} \
            -t "${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" \
            -t "${{ env.FRONTEND_IMAGE }}:latest" \
            ./frontend
          docker push "${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          docker push "${{ env.FRONTEND_IMAGE }}:latest"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marketing-ai-frontend
          region: ${{ env.REGION }}
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
          env_vars: |
            BACKEND_URL=${{ needs.deploy-backend.outputs.backend_url }}

      - name: Print frontend URL
        run: echo "Frontend URL ${{ steps.deploy.outputs.url }}"
